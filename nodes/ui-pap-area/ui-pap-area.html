<script type="text/javascript">
    RED.nodes.registerType('ui-pap-area', {
        category: 'config',
        color: '#2b2b30',
        defaults: {
            name:   { value: 'Area', required: true },
            server: { value: '', type: 'ui-pap-server', required: true },
            order:  { value: 0 }
        },
        label: function () {
            return this.name || 'Area'
        },
        icon: 'font-awesome/fa-building'
    })
</script>

<script type="text/html" data-template-name="ui-pap-area">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="e.g. Home, Garden, Office Building">
    </div>
    <div class="form-row">
        <label for="node-config-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-config-input-server">
    </div>
    <div class="form-row">
        <label for="node-config-input-order"><i class="fa fa-sort"></i> Order</label>
        <input type="number" id="node-config-input-order" placeholder="0" style="width: 80px;">
    </div>
</script>

<script type="text/html" data-help-name="ui-pap-area">
    <p>Optional grouping of pages. Useful for multi-floor or multi-location setups.</p>
    <p>Pages can optionally reference an area for visual grouping in the dashboard.</p>
</script>
