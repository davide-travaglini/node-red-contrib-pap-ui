<script type="text/javascript">
    RED.nodes.registerType('ui-pap-group', {
        category: 'config',
        color: '#2b2b30',
        defaults: {
            name:  { value: 'Group', required: true },
            page:  { value: '', type: 'ui-pap-page', required: true },
            order: { value: 0 },
            icon:  { value: 'folder' }
        },
        label: function () {
            return this.name || 'Group'
        },
        icon: 'font-awesome/fa-folder'
    })
</script>

<script type="text/html" data-template-name="ui-pap-group">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="e.g. Lights">
    </div>
    <div class="form-row">
        <label for="node-config-input-icon"><i class="fa fa-image"></i> Icon</label>
        <input type="text" id="node-config-input-icon" placeholder="e.g. lightbulb-o, toggle-on, thermometer-half">
    </div>
    <div class="form-row">
        <label for="node-config-input-page"><i class="fa fa-file"></i> Page</label>
        <input type="text" id="node-config-input-page">
    </div>
    <div class="form-row">
        <label for="node-config-input-order"><i class="fa fa-sort"></i> Order</label>
        <input type="number" id="node-config-input-order" placeholder="0" style="width: 80px;">
    </div>
</script>

<script type="text/html" data-help-name="ui-pap-group">
    <p>Defines a group of widgets within a page (e.g. "Lights", "Switches", "Sensors").</p>
</script>
