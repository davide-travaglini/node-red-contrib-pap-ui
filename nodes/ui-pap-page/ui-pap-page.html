<script type="text/javascript">
    RED.nodes.registerType('ui-pap-page', {
        category: 'config',
        color: '#2b2b30',
        defaults: {
            name:        { value: 'Room', required: true },
            server:      { value: '', type: 'ui-pap-server', required: true },
            area:        { value: '', type: 'ui-pap-area', required: false },
            icon:        { value: 'home' },
            color:       { value: '' },
            order:       { value: 0 },
            isHome:      { value: false },
            gridColumns: { value: 4 }
        },
        label: function () {
            return this.name || 'Page'
        },
        icon: 'font-awesome/fa-home'
    })
</script>

<script type="text/html" data-template-name="ui-pap-page">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="e.g. Bedroom">
    </div>
    <div class="form-row">
        <label for="node-config-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-config-input-server">
    </div>
    <div class="form-row">
        <label for="node-config-input-area"><i class="fa fa-building"></i> Area <small style="color:#888">(optional)</small></label>
        <input type="text" id="node-config-input-area">
    </div>
    <div class="form-row">
        <label for="node-config-input-icon"><i class="fa fa-image"></i> Icon</label>
        <input type="text" id="node-config-input-icon" placeholder="e.g. bedroom, office, kitchen">
    </div>
    <div class="form-row">
        <label for="node-config-input-color"><i class="fa fa-paint-brush"></i> Accent</label>
        <select id="node-config-input-color" style="width: calc(100% - 110px);">
            <option value="">— none —</option>
            <option value="yellow">Yellow</option>
            <option value="orange">Orange</option>
            <option value="purple">Purple</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-config-input-order"><i class="fa fa-sort"></i> Order</label>
        <input type="number" id="node-config-input-order" placeholder="0" style="width: 80px;">
    </div>
    <div class="form-row">
        <label for="node-config-input-gridColumns"><i class="fa fa-th"></i> Grid columns</label>
        <input type="number" id="node-config-input-gridColumns" placeholder="4" min="1" max="12" style="width: 80px;">
        <span style="margin-left:8px; font-size:0.85em; color:#888;">colonne nella griglia widget (es. 4, 6, 8)</span>
    </div>
    <div class="form-row">
        <label style="width:auto;"><i class="fa fa-home"></i> Home page</label>
        <input type="checkbox" id="node-config-input-isHome" style="width:auto; margin-left:8px;">
        <span style="margin-left:8px; font-size:0.85em; color:#888;">aperta di default all'avvio</span>
    </div>
</script>

<script type="text/html" data-help-name="ui-pap-page">
    <p>Defines a page (room) in the PAP Dashboard. Pages appear as tiles in the left sidebar.</p>
</script>
