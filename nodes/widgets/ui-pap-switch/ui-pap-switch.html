<script type="text/javascript">
    RED.nodes.registerType('ui-pap-switch', {
        category: 'PAP Dashboard',
        color: '#34a4ff',
        defaults: {
            name:        { value: 'Switch' },
            subgroup:    { value: '', type: 'ui-pap-subgroup', required: true },
            order:       { value: 0 },
            icon:        { value: 'toggle-on' },
            accentColor: { value: 'blue' },
            readOnly: { value: false },
            iconOn:   { value: 'toggle-on' },
            iconOff:  { value: 'toggle-off' },
            driverLabel: { value: '' },
            gridW:       { value: 1 },
            gridH:       { value: 1 }
        },
        inputs:  1,
        outputs: 1,
        icon: 'font-awesome/fa-toggle-on',
        label: function () { return this.name || 'Switch' },
        paletteLabel: 'switch'
    })
</script>

<script type="text/html" data-template-name="ui-pap-switch">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="e.g. Speakers">
    </div>
    <div class="form-row">
        <label for="node-input-subgroup"><i class="fa fa-th-large"></i> Subgroup</label>
        <input type="text" id="node-input-subgroup">
    </div>
    <div class="form-row">
        <label for="node-input-order"><i class="fa fa-sort"></i> Order</label>
        <input type="number" id="node-input-order" style="width:80px;" placeholder="0">
    </div>
    <div class="form-row">
        <label for="node-input-driverLabel"><i class="fa fa-microchip"></i> Driver</label>
        <input type="text" id="node-input-driverLabel" placeholder="e.g. ARDUINO RELAY">
    </div>
    <div class="form-row">
        <label for="node-input-icon"><i class="fa fa-image"></i> Icon</label>
        <input type="text" id="node-input-icon" placeholder="e.g. toggle-on, plug, power-off">
    </div>
    <div class="form-row">
        <label for="node-input-iconOn"><i class="fa fa-toggle-on"></i> Icon ON</label>
        <input type="text" id="node-input-iconOn" placeholder="toggle-on, plug, lightbulb-o">
    </div>
    <div class="form-row">
        <label for="node-input-iconOff"><i class="fa fa-toggle-off"></i> Icon OFF</label>
        <input type="text" id="node-input-iconOff" placeholder="toggle-off, plug, power-off">
    </div>
    <div class="form-row">
        <label for="node-input-readOnly"><i class="fa fa-lock"></i> Read only</label>
        <input type="checkbox" id="node-input-readOnly" style="width:auto; margin-left:4px;">
    </div>
    <div class="form-row">
        <label for="node-input-accentColor"><i class="fa fa-paint-brush"></i> Accent</label>
        <select id="node-input-accentColor">
            <option value="yellow">Yellow</option>
            <option value="orange">Orange</option>
            <option value="purple">Purple</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
        </select>
    </div>
    <div class="form-row">
        <label><i class="fa fa-th"></i> Grid size</label>
        <input type="number" id="node-input-gridW" min="1" max="12" style="width:50px;" placeholder="1">
        <span style="margin: 0 6px;">×</span>
        <input type="number" id="node-input-gridH" min="1" max="12" style="width:50px;" placeholder="1">
        <span style="margin-left:8px; font-size:0.85em; color:#888;">colonne × righe</span>
    </div>
</script>

<script type="text/html" data-help-name="ui-pap-switch">
    <p>On/off switch widget. Input: boolean or truthy payload. Output on user toggle.</p>
</script>
