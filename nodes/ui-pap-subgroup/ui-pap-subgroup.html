<script type="text/javascript">
    RED.nodes.registerType('ui-pap-subgroup', {
        category: 'config',
        color: '#2b2b30',
        defaults: {
            name:  { value: 'Subgroup', required: true },
            group: { value: '', type: 'ui-pap-group', required: true },
            order: { value: 0 },
            icon:  { value: '' }
        },
        label: function () {
            return this.name || 'Subgroup'
        },
        icon: 'font-awesome/fa-th-large'
    })
</script>

<script type="text/html" data-template-name="ui-pap-subgroup">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="e.g. Bedroom, Lights, Energy">
    </div>
    <div class="form-row">
        <label for="node-config-input-icon"><i class="fa fa-image"></i> Icon</label>
        <input type="text" id="node-config-input-icon" placeholder="e.g. bolt, bed, leaf">
    </div>
    <div class="form-row">
        <label for="node-config-input-group"><i class="fa fa-folder"></i> Group</label>
        <input type="text" id="node-config-input-group">
    </div>
    <div class="form-row">
        <label for="node-config-input-order"><i class="fa fa-sort"></i> Order</label>
        <input type="number" id="node-config-input-order" placeholder="0" style="width: 80px;">
    </div>
</script>

<script type="text/html" data-help-name="ui-pap-subgroup">
    <p>A subgroup organizes widgets within a group (room). Subgroup names appear as section headers in the tile view (e.g. BEDROOM, ENERGY, LIGHTS).</p>
</script>
